name: CI_Check

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'
          cache: true

      - name: Setup environment
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Install dependencies
        run: |
          go get .
          go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          args: >
            --timeout=5m
            ./...

      - name: Format check (gofmt)
        run: |
          fmt_out="$(gofmt -s -l .)"
          if [ -n "$fmt_out" ]; then
            echo "The following files are not gofmt-ed:"
            echo "$fmt_out"
            exit 1
          fi

      - name: Build
        run: go build -v ./...

      - name: Test
        run: |
          mkdir -p coverage
          go test ./... -race -covermode=atomic -coverprofile=coverage/coverage.out
          go tool cover -fun>c=coverage/coverage.out | tee coverage/summary.txt

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: msys2/setup-msys2@v2

      - uses: actions/checkout@v6

      - shell: msys2 {0}
        name: "Setup environment: sync pacman packages"
        continue-on-error: true
        run: |
          pacman -Syu --noconfirm 

      - shell: msys2 {0}
        name: "Setup environment: install packages"
        continue-on-error: true
        run: |
          pacman -S git mingw-w64-x86_64-toolchain mingw-w64-x86_64-go --noconfirm 

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'
          cache: true

      - name: Install dependencies
        run: |
          go get .
          go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Build
        run: go build -v ./...

      - name: Test
        run: |
          go test -short ./... 
