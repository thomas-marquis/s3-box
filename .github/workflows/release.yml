name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  BASE_APP_NAME: "S3Box"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'
          cache: true

      - name: Setup environment
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libc6

      - name: Install dependencies
        run: |
          go get .
          go install fyne.io/fyne/v2/cmd/fyne@latest
          go install github.com/fyne-io/fyne-cross@latest

      - name: Test
        run: go test -v ./...

      - name: Get semver
        id: get_version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Package for Linux
        run: |
          fyne-cross linux -arch=amd64 -name ${{ env.BASE_APP_NAME }} -icon resources/logo-wbg.png -app-version ${{ steps.get_version.outputs.version }}

      - name: Upload binary to release
        uses: svenstaro/upload-release-action@v2
        with:
          make_latest: true
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: fyne-cross/dist/linux-amd64/${{ env.BASE_APP_NAME }}.tar.xz
          asset_name: ${{ env.BASE_APP_NAME }}-linux-amd64-${{ github.ref_name }}.tar.xz
          tag: ${{ github.ref }}
          overwrite: true
          body: "New release ${{ github.ref_name }}"
          draft: false
          prerelease: false

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: msys2/setup-msys2@v2

      - uses: actions/checkout@v6

      - shell: msys2 {0}
        name: "Setup environment: sync pacman packages"
        continue-on-error: true
        run: |
          pacman -Syu --noconfirm 

      - shell: msys2 {0}
        name: "Setup environment: install packages"
        continue-on-error: true
        run: |
          pacman -S git mingw-w64-x86_64-toolchain mingw-w64-x86_64-go --noconfirm 

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'
          cache: true

      - name: Install dependencies
        run: |
          go get .
          go install fyne.io/fyne/v2/cmd/fyne@latest
          go install github.com/fyne-io/fyne-cross@latest

      - name: Get semver
        id: get_version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Package for Windows
        run: |
          fyne-cross windows -arch=amd64 -name ${{ env.BASE_APP_NAME }} -icon resources/logo-wbg.png -app-version ${{ steps.get_version.outputs.version }}

      - name: Upload binary to release
        uses: svenstaro/upload-release-action@v2
        with:
          make_latest: true
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: fyne-cross/dist/windows-amd64/${{ env.BASE_APP_NAME }}.zip
          asset_name: ${{ env.BASE_APP_NAME }}-windows-amd64-${{ github.ref_name }}.zip
          tag: ${{ github.ref }}
          overwrite: true
          body: "New release ${{ github.ref_name }}"
          draft: false
          prerelease: false
